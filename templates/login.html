<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ArtVault – Login</title>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body class="auth-page">

<div class="auth-card">

  <div class="auth-logo">Art<em>Vault</em></div>
  <p class="auth-subtitle">Welcome back! Log in to your account.</p>

  <form id="login-form" novalidate>
    <div class="form-group">
      <label for="email">Email</label>
      <input
        id="email"
        type="email"
        class="form-control"
        placeholder="you@example.com"
        required
      />
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input
        id="password"
        type="password"
        class="form-control"
        placeholder="Your password"
        required
      />
    </div>

    <p id="error-msg" style="color:#EF4444; font-size:.85rem; margin-bottom:.75rem; display:none;"></p>

    <button type="submit" class="btn btn-primary btn-block">Login</button>
  </form>

  <p style="text-align:center; margin-top:1.25rem; font-size:.875rem; color:var(--text-muted);">
    Don't have an account? <a href="/signup" style="color:var(--primary); font-weight:600;">Sign up</a>
  </p>
</div>

<div id="toast-container"></div>
<script src="/static/js/main.js"></script>
<script>


document.getElementById("login-form").addEventListener("submit", async (e) => {
  e.preventDefault();  

  const email    = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const errorEl  = document.getElementById("error-msg");

  // Simple front-end validation
  if (!email || !password) {
    errorEl.textContent = "Please fill in all fields.";
    errorEl.style.display = "block";
    return;
  }

  // Send credentials to the backend
  const res  = await fetch("/login", {
    method:  "POST",
    headers: { "Content-Type": "application/json" },
    body:    JSON.stringify({ email, password }),
  });
  const data = await res.json();

  if (res.ok) {
    showToast("Logged in! Redirecting…", "success");
    setTimeout(() => window.location.href = "/", 800);
  } else {
    errorEl.textContent = data.error || "Login failed.";
    errorEl.style.display = "block";
  }
});
</script>
</body>
</html>
