<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ArtVault – Create Account</title>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body class="auth-page">

<div class="auth-card">
  <div class="auth-logo">Art<em>Vault</em></div>
  <p class="auth-subtitle">Create your free artist account today.</p>

  <form id="signup-form" novalidate>
    <div class="form-group">
      <label for="username">Username</label>
      <input
        id="username"
        type="text"
        class="form-control"
        placeholder="e.g. pixel_wizard"
        required
        minlength="3"
        maxlength="30"
      />
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input
        id="email"
        type="email"
        class="form-control"
        placeholder="you@example.com"
        required
      />
    </div>

    <div class="form-group">
      <label for="password">Password <span style="color:var(--text-muted); font-weight:400;">(min 6 chars)</span></label>
      <input
        id="password"
        type="password"
        class="form-control"
        placeholder="Create a password"
        required
        minlength="6"
      />
    </div>

    <p id="error-msg" style="color:#EF4444; font-size:.85rem; margin-bottom:.75rem; display:none;"></p>

    <button type="submit" class="btn btn-primary btn-block">Create Account</button>
  </form>

  <p style="text-align:center; margin-top:1.25rem; font-size:.875rem; color:var(--text-muted);">
    Already have an account? <a href="/login" style="color:var(--primary); font-weight:600;">Log in</a>
  </p>
</div>

<div id="toast-container"></div>
<script src="/static/js/main.js"></script>
<script>
document.getElementById("signup-form").addEventListener("submit", async (e) => {
  e.preventDefault();

  const username = document.getElementById("username").value.trim();
  const email    = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const errorEl  = document.getElementById("error-msg");

  errorEl.style.display = "none";

  if (!username || !email || !password) {
    errorEl.textContent = "All fields are required.";
    errorEl.style.display = "block";
    return;
  }
  if (username.length < 3) {
    errorEl.textContent = "Username must be at least 3 characters.";
    errorEl.style.display = "block";
    return;
  }
  if (password.length < 6) {
    errorEl.textContent = "Password must be at least 6 characters.";
    errorEl.style.display = "block";
    return;
  }

  const res  = await fetch("/signup", {
    method:  "POST",
    headers: { "Content-Type": "application/json" },
    body:    JSON.stringify({ username, email, password }),
  });
  const data = await res.json();

  if (res.ok) {
    showToast("Account created! Redirecting to login…", "success");
    setTimeout(() => window.location.href = "/login", 1200);
  } else {
    errorEl.textContent = data.error || "Registration failed.";
    errorEl.style.display = "block";
  }
});
</script>
</body>
</html>
