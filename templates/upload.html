<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ArtVault – Upload Art</title>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <a href="/" class="nav-logo">Art<em>Vault</em></a>
    <div class="nav-links">
      <a href="/">Gallery</a>
      <a href="/upload" class="active">Upload</a>
      <div id="nav-auth"></div>
    </div>
  </div>
</nav>

<div class="page-container" style="max-width: 640px;">
  <div class="page-header">
    <h1>Upload Artwork</h1>
    <p>Share your creation with the ArtVault community.</p>
  </div>

  <div class="auth-card" style="max-width:100%;">

    <div class="form-group">
      <label>Artwork Image</label>
      <label class="upload-area" id="upload-area" for="image-input">
        <div class="icon">🖼️</div>
        <p>Click to choose an image</p>
        <p style="font-size:.8rem; margin-top:.3rem;">PNG, JPG, GIF, WEBP · Max 10 MB</p>
        <img id="preview" class="upload-preview hidden" alt="preview"/>
        <input
          id="image-input"
          type="file"
          accept="image/*"
        />
      </label>
    </div>

    <div class="form-group">
      <label for="title">Title <span style="color:#EF4444;">*</span></label>
      <input
        id="title"
        type="text"
        class="form-control"
        placeholder="Give your artwork a name"
        maxlength="100"
        required
      />
    </div>

    <div class="form-group">
      <label for="category">Category</label>
      <select id="category" class="form-control">
        <option value="Sketch">Sketch</option>
        <option value="Pattern">Pattern</option>
        <option value="Abstract">Abstract</option>
        <option value="Portrait">Portrait</option>
        <option value="Landscape">Landscape</option>
        <option value="Character">Character</option>
        <option value="Digital">Digital</option>
        <option value="Other" selected>Other</option>
      </select>
    </div>

    <p id="error-msg" style="color:#EF4444; font-size:.85rem; margin-bottom:.75rem; display:none;"></p>

    <button id="upload-btn" class="btn btn-primary btn-block">🚀 Upload Artwork</button>
  </div>
</div>

<div id="toast-container"></div>
<script src="/static/js/main.js"></script>
<script>

/* ─────Upload page logic──────── */

(async () => {
  const user = await getCurrentUser();
  if (!user.logged_in) {
    showToast("Please log in to upload artwork", "error");
    setTimeout(() => window.location.href = "/login", 1200);
  }
})();

document.getElementById("image-input").addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const preview   = document.getElementById("preview");
  const uploadArea = document.getElementById("upload-area");

  const reader = new FileReader();
  reader.onload = (ev) => {
    preview.src = ev.target.result;
    preview.classList.remove("hidden");
    uploadArea.classList.add("has-file");
    uploadArea.querySelector("p").textContent = file.name;
  };
  reader.readAsDataURL(file);
});

// Submit the form
document.getElementById("upload-btn").addEventListener("click", async () => {
  const fileInput = document.getElementById("image-input");
  const title     = document.getElementById("title").value.trim();
  const category  = document.getElementById("category").value;
  const errorEl   = document.getElementById("error-msg");
  const btn       = document.getElementById("upload-btn");

  errorEl.style.display = "none";

  // Validation
  if (!fileInput.files[0]) {
    errorEl.textContent = "Please select an image file.";
    errorEl.style.display = "block";
    return;
  }
  if (!title) {
    errorEl.textContent = "Please enter a title for your artwork.";
    errorEl.style.display = "block";
    return;
  }

  const formData = new FormData();
  formData.append("image",    fileInput.files[0]);
  formData.append("title",    title);
  formData.append("category", category);

  btn.textContent = "Uploading…";
  btn.disabled    = true;

  try {
    const res  = await fetch("/upload-art", { method: "POST", body: formData });
    const data = await res.json();

    if (res.ok) {
      showToast("Artwork uploaded! Redirecting…", "success");
      setTimeout(() => window.location.href = "/", 1000);
    } else {
      errorEl.textContent = data.error || "Upload failed. Try again.";
      errorEl.style.display = "block";
      btn.textContent = "🚀 Upload Artwork";
      btn.disabled    = false;
    }
  } catch {
    errorEl.textContent = "Network error. Is the server running?";
    errorEl.style.display = "block";
    btn.textContent = "🚀 Upload Artwork";
    btn.disabled    = false;
  }
});
</script>
</body>
</html>
